# ============================================
# 메뚜기 자동매매 v2 - 일반 설정
# 민감정보(앱키)는 .env 파일에 별도 관리
# ============================================

# 실행 모드
# mock: 모의투자 / real: 실전투자
# 실전 전환 시 반드시 별도 확인 절차 필요 (Phase 11)
mode: mock

# KIS API 엔드포인트
kis:
  mock:
    rest_url: "https://openapivts.koreainvestment.com:29443"
    ws_url: "ws://ops.koreainvestment.com:31000"
    # 모의투자 레이트리밋: 2 req/s (공식 _smartSleep=0.5)
    rate_limit_interval: 0.5
  real:
    rest_url: "https://openapi.koreainvestment.com:9443"
    ws_url: "ws://ops.koreainvestment.com:21000"
    # 실전투자 레이트리밋: 20 req/s (공식 _smartSleep=0.05)
    rate_limit_interval: 0.05

# 토큰 관리
token:
  # 실제 만료 시간보다 N분 전을 "만료"로 간주 (경계 상황 방지)
  expiry_buffer_minutes: 10
  # 토큰 캐시 파일 저장 경로 (프로젝트 루트 기준)
  cache_dir: "storage/tokens"

# 로깅
logging:
  # DEBUG / INFO / WARNING / ERROR
  level: INFO
  # 로그 파일 저장 경로
  log_dir: "logs"
  # 콘솔 출력 여부
  console: true
  # 파일 출력 여부
  file: true

# 네트워크
network:
  # HTTP 요청 타임아웃 (초)
  request_timeout: 10
  # 토큰 발급 실패 시 최대 재시도 횟수
  token_retry_count: 3
  # 토큰 발급 재시도 간격 (초)
  token_retry_delay: 5
  # 일반 API GET 호출 재시도 (POST는 절대 재시도 안 함)
  request_retry_count: 2
  # 재시도 간격 (초). 실제 대기 = delay * attempt (지수 백오프)
  request_retry_delay: 1

  # HTTP 헤더 기본값
http:
  # User-Agent (KIS 공식 샘플 기본값 사용 권장)
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"